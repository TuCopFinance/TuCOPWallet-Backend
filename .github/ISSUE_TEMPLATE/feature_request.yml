name: Feature request
description: Suggest a new endpoint, capability, or improvement
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement.

        For features that touch the WRI relay, indexer schema, or hooks-api calldata builders, please discuss the design here before opening a PR.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point does this solve? Who benefits and how?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the endpoint or behavior look like? Include request/response shape if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you ruled them out.

  - type: dropdown
    id: affected-area
    attributes:
      label: Area
      multiple: true
      options:
        - "/api/swap/quote"
        - "/api/wri/delegate-relay"
        - "/api/transactions/*"
        - "/hooks-api/*"
        - "/events"
        - "Blockscout proxy"
        - "/api/prices/xaut"
        - "Indexer (transactions)"
        - "Indexer (Neeru)"
        - "DevOps / CI / deploy"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to wallet-side issues, partner docs, related PRs, etc.
