name: Security

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans the diff range, not just HEAD.
          fetch-depth: 0
      # Use the OSS gitleaks binary directly. The gitleaks/gitleaks-action@v2
      # GitHub Action requires a paid GITLEAKS_LICENSE for any repo owned by
      # an organisation, even when the repo is public. The binary itself
      # stays MIT-licensed and free; the action is the licensed wrapper.
      # Running the binary directly gets the same scan without a paid licence.
      - name: Run gitleaks (OSS binary, no license required)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.18.4
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --verbose --exit-code 1

  dependency-review:
    name: Dependency review (CVEs in new deps)
    runs-on: ubuntu-latest
    # Pull-request only; on push there's no compare-base to review against.
    # Requires "Dependency graph" enabled in repo Settings -> Code security
    # -> Dependency graph. If disabled, the action fails with a clear
    # "not supported on this repository" message - that's a one-click
    # operator action, not a code fix.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce HIGH or CRITICAL severity CVEs.
          fail-on-severity: high
          # Allow licenses commonly used in our deps. Add as needed.
          allow-licenses: Apache-2.0, MIT, ISC, BSD-2-Clause, BSD-3-Clause, CC0-1.0, CC-BY-4.0, 0BSD, Unlicense

  commitlint:
    name: Commit message lint (conventional commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Install commitlint inline (no devDep added to package.json so the
      # production install stays small). Allows the in-repo commit history
      # convention to be enforced without an extra dep on the runtime.
      - name: Install commitlint
        run: |
          npm install --no-save --no-package-lock \
            @commitlint/cli@19 \
            @commitlint/config-conventional@19
      # Write the config to a real file. Previous attempt used
      # `--config <(echo "module.exports = ...")` but commitlint's
      # cosmiconfig loader treats process-substitution paths as YAML first
      # and errors out before falling back to the JS loader.
      - name: Lint PR commits
        run: |
          set -euo pipefail
          cat > .commitlintrc.cjs <<'EOF'
          module.exports = { extends: ['@commitlint/config-conventional'] }
          EOF
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --config .commitlintrc.cjs
